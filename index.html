<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, user-scalable=yes, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0706" />
  <meta name="description" content="Masal Burger — Menü" />
  <title>Masal Burger — Menü</title>
  <link rel="icon" href="menu.jpeg" />
  <link rel="preload" as="image" href="menu.jpeg" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: #0a0706;
      color: #f5efe6;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overscroll-behavior: none;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      background:
        radial-gradient(ellipse 90% 50% at 50% 0%, rgba(255, 106, 26, 0.22), transparent 60%),
        radial-gradient(ellipse 70% 40% at 50% 100%, rgba(255, 106, 26, 0.10), transparent 70%),
        #0a0706;
    }

    /* Mobile-first phone column — desktop sees same compact view, centered */
    .app {
      width: 100%;
      max-width: 460px;
      margin: 0 auto;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      padding:
        calc(env(safe-area-inset-top) + 22px)
        18px
        calc(env(safe-area-inset-bottom) + 14px);
    }

    /* Brand */
    .brand {
      text-align: center;
      opacity: 0;
      transform: translateY(-6px);
      animation: fadeUp 0.7s ease 0.1s forwards;
    }
    .brand-mark {
      font-family: Georgia, "Times New Roman", serif;
      font-style: italic;
      font-weight: 400;
      font-size: 34px;
      color: #ff7a2a;
      line-height: 1;
      margin: 0;
      text-shadow: 0 2px 18px rgba(255, 106, 26, 0.4);
    }
    .brand-mark .amp { color: #f5efe6; opacity: 0.65; font-size: 0.7em; }
    .brand-divider {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin: 12px 0 0;
    }
    .brand-divider::before,
    .brand-divider::after {
      content: "";
      width: 36px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(245, 239, 230, 0.35), transparent);
    }
    .brand-tag {
      font-size: 10px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #f5efe6;
      opacity: 0.7;
    }

    /* Menu */
    .menu-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 14px;
      padding: 26px 0 18px;
      opacity: 0;
      transform: translateY(10px);
      animation: fadeUp 0.8s ease 0.3s forwards;
    }
    .menu-card {
      position: relative;
      border-radius: 14px;
      overflow: hidden;
      cursor: zoom-in;
      transition: transform 0.35s cubic-bezier(0.2, 0.8, 0.2, 1);
      box-shadow:
        0 0 0 1px rgba(255, 122, 42, 0.14),
        0 18px 50px -18px rgba(255, 106, 26, 0.4),
        0 6px 24px -8px rgba(0, 0, 0, 0.55);
    }
    .menu-card:active { transform: scale(0.985); }
    .menu-card img {
      width: 100%;
      height: auto;
      display: block;
    }

    .tap-cta {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #f5efe6;
      opacity: 0.55;
    }
    .tap-cta .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #ff7a2a;
      box-shadow: 0 0 10px #ff7a2a;
      animation: pulse 1.6s ease-in-out infinite;
    }

    /* Footer */
    footer {
      padding-top: 14px;
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      opacity: 0.3;
      text-align: center;
      animation: fadeUp 0.9s ease 0.5s both;
    }

    /* Lightbox */
    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.97);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
      animation: fadeIn 0.2s ease;
    }
    .lightbox.open { display: flex; }
    .lightbox img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      cursor: zoom-out;
      user-select: none;
      -webkit-user-drag: none;
    }
    .lightbox .close {
      position: absolute;
      top: max(14px, env(safe-area-inset-top));
      right: max(14px, env(safe-area-inset-right));
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      color: #fff;
      font-size: 22px;
      line-height: 1;
      cursor: pointer;
      display: grid;
      place-items: center;
    }

    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.7); }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="brand">
      <h1 class="brand-mark">Masal <span class="amp">·</span> Burger</h1>
      <div class="brand-divider"><span class="brand-tag">Menü</span></div>
    </header>

    <main class="menu-wrap">
      <div class="menu-card" id="trigger" role="button" tabindex="0" aria-label="Menüyü tam ekran görüntüle">
        <img src="menu.jpeg" alt="Masal Burger Menü" loading="eager" decoding="async" />
      </div>
      <div class="tap-cta"><span class="dot"></span>Tam ekran için dokun</div>
    </main>

    <footer>© Masal Burger</footer>
  </div>

  <div id="lightbox" class="lightbox" role="dialog" aria-label="Menü tam ekran">
    <button class="close" aria-label="Kapat">×</button>
    <img src="menu.jpeg" alt="Masal Burger Menü" />
  </div>

  <script>
    const trigger = document.getElementById('trigger');
    const lb = document.getElementById('lightbox');
    const closeBtn = lb.querySelector('.close');
    const open = () => { lb.classList.add('open'); document.body.style.overflow = 'hidden'; };
    const close = () => { lb.classList.remove('open'); document.body.style.overflow = ''; };
    trigger.addEventListener('click', open);
    trigger.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); open(); } });
    closeBtn.addEventListener('click', close);
    lb.addEventListener('click', (e) => { if (e.target === lb || e.target.tagName === 'IMG') close(); });
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') close(); });
  </script>
</body>
</html>
